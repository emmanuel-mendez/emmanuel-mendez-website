<section class="projects">
  <h2 class="projects__title">Projects</h2>
  <div class="projects__grid">
    @for (project of projects; track project.title) {
      <article class="projects__card">
        <div class="projects__card-header">
          <span class="material-symbols-outlined projects__card-icon">{{ project.icon }}</span>
          <h3 class="projects__card-title">{{ project.title }}</h3>
        </div>
        <p class="projects__card-description">{{ project.description }}</p>
        <ul class="projects__card-tags">
          @for (tech of project.technologies; track tech) {
            <li class="projects__card-tag">{{ tech }}</li>
          }
        </ul>
        <div class="projects__card-actions">
          @if (project.link) {
            <a
              class="projects__card-link"
              [href]="project.link"
              target="_blank"
              rel="noopener noreferrer"
            >
              <span class="material-symbols-outlined projects__card-link-icon">open_in_new</span>
              Live
            </a>
          }
          @if (project.sourceCode) {
            <a
              class="projects__card-link"
              [href]="project.sourceCode"
              target="_blank"
              rel="noopener noreferrer"
            >
              <span class="material-symbols-outlined projects__card-link-icon">code</span>
              Source
            </a>
          }
        </div>
      </article>
    }
  </div>
</section>
