<section class="testimonials">
  <h2 class="testimonials__title">Testimonials</h2>
  <ul class="testimonials__list">
    @for (testimonial of testimonials; track testimonial.id) {
      <li class="testimonials__item">
        <article class="testimonials__card">
          <span class="material-symbols-outlined testimonials__quote-icon" aria-hidden="true"
            >format_quote</span
          >
          <p class="testimonials__text">{{ testimonial.text }}</p>
          <footer class="testimonials__footer">
            <div class="testimonials__author">
              <span class="testimonials__author-name">{{ testimonial.name }}</span>
              <span class="testimonials__author-role"
                >{{ testimonial.role }} · {{ testimonial.company }}</span
              >
            </div>
            <div
              class="testimonials__rating"
              [attr.aria-label]="testimonial.rating + ' out of 5 stars'"
            >
              @for (star of stars; track star) {
                <span
                  class="material-symbols-outlined testimonials__star"
                  [class.testimonials__star--filled]="star <= testimonial.rating"
                  aria-hidden="true"
                  >star</span
                >
              }
            </div>
          </footer>
        </article>
      </li>
    }
  </ul>
</section>
